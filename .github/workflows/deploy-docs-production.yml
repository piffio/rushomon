name: Deploy Docs to Production

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-production-deploy
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-docs:
    name: Deploy Docs to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-main}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "📌 Deploying docs for version: $TAG"


      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Cache npm
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-docs-node-${{ hashFiles('docs-site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-docs-node-

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Validate versioned docs and versions.json
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "� Validating versioned docs for $TAG..."

          # Check that TAG is in versions.json
          if ! grep -q "\"${TAG}\"" docs-site/versions.json; then
            echo "❌ Version ${TAG} not found in docs-site/versions.json"
            echo "💡 Run 'make version-tag' to update versions.json before tagging"
            exit 1
          fi

          # Check OpenAPI spec exists
          if [ ! -f "docs/openapi/${TAG}.json" ]; then
            echo "❌ Missing OpenAPI spec: docs/openapi/${TAG}.json"
            echo "💡 Run 'make version-tag' to create versioned docs before tagging"
            exit 1
          fi

          # Check versioned docs directory exists
          if [ ! -d "docs-site/versioned_docs/version-${TAG}" ]; then
            echo "❌ Missing versioned docs: docs-site/versioned_docs/version-${TAG}"
            echo "💡 Run 'make version-tag' to create versioned docs before tagging"
            exit 1
          fi

          # Check versioned sidebar exists
          if [ ! -f "docs-site/versioned_sidebars/version-${TAG}-sidebars.json" ]; then
            echo "❌ Missing versioned sidebar: docs-site/versioned_sidebars/version-${TAG}-sidebars.json"
            echo "💡 Run 'make version-tag' to create versioned docs before tagging"
            exit 1
          fi

          echo "✅ All versioned docs found for $TAG"

      - name: Copy versioned spec to main.json
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          cp "docs/openapi/${TAG}.json" docs/openapi/main.json
          echo "✅ Copied ${TAG}.json to main.json"

      - name: Install docs-site dependencies
        working-directory: docs-site
        run: npm ci


      - name: Generate OpenAPI docs
        working-directory: docs-site
        run: npm run docusaurus gen-api-docs all

      - name: Build docs site
        working-directory: docs-site
        env:
          DOCS_SITE_URL: https://doc.rushomon.cc
        run: npm run build

      - name: Generate wrangler docs production config
        run: |
          cat > wrangler.docs-production.toml << 'EOF'
          name = "rushomon-docs-production"
          compatibility_date = "2026-02-10"
          workers_dev = false

          [assets]
          directory = "./docs-site/build"
          binding = "ASSETS"
          not_found_handling = "404-page"
          EOF

          echo "✅ Generated wrangler.docs-production.toml"

      - name: Deploy docs to Cloudflare
        run: |
          echo "🚀 Deploying docs to production..."
          wrangler deploy --config wrangler.docs-production.toml
          echo "✅ Docs deployed to production"

      - name: Smoke test docs site
        run: |
          DOCS_URL="https://doc.rushomon.cc"

          echo "🧪 Smoke testing docs at $DOCS_URL"
          sleep 10

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$DOCS_URL/")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Docs homepage is up (HTTP 200)"
          else
            echo "⚠️  Docs homepage returned HTTP $STATUS (custom domain may not be configured yet)"
          fi
