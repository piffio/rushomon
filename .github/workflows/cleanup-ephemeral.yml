name: Cleanup Ephemeral Environment

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cleanup:
    name: Cleanup Ephemeral Resources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ACTIONS_NODE_VERSION: "24"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract PR Number
        id: pr_number
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Restore Deployment Info Cache
        if: always()
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .github/ephemeral-envs/pr-${{ steps.pr_number.outputs.pr_number }}.json
          key: ephemeral-deployment-pr-${{ steps.pr_number.outputs.pr_number }}
        continue-on-error: true

      - name: Check Deployment Status
        id: check_deployment
        run: |
          PR_NUMBER="${{ steps.pr_number.outputs.pr_number }}"
          DEPLOYMENT_FILE=".github/ephemeral-envs/pr-$PR_NUMBER.json"

          echo "Checking for deployment file: $DEPLOYMENT_FILE"

          if [ -f "$DEPLOYMENT_FILE" ]; then
            echo "✅ Deployment file found - checking deployment info"

            # Read deployment info from file
            if command -v jq >/dev/null 2>&1; then
              DB_ID=$(jq -r '.database_id // empty' "$DEPLOYMENT_FILE")
              KV_ID=$(jq -r '.kv_id // empty' "$DEPLOYMENT_FILE")
              CREATED_AT=$(jq -r '.created_at // empty' "$DEPLOYMENT_FILE")
              FRONTEND_URL=$(jq -r '.frontend_url // empty' "$DEPLOYMENT_FILE")
              BACKEND_URL=$(jq -r '.backend_url // empty' "$DEPLOYMENT_FILE")
            else
              echo "❌ jq not available, using fallback parsing"
              # Fallback parsing without jq
              DB_ID=$(grep '"database_id"' "$DEPLOYMENT_FILE" | sed 's/.*"database_id": *"\([^"]*\)".*/\1/' || echo "")
              KV_ID=$(grep '"kv_id"' "$DEPLOYMENT_FILE" | sed 's/.*"kv_id": *"\([^"]*\)".*/\1/' || echo "")
              CREATED_AT=$(grep '"created_at"' "$DEPLOYMENT_FILE" | sed 's/.*"created_at": *"\([^"]*\)".*/\1/' || echo "")
              FRONTEND_URL=$(grep '"frontend_url"' "$DEPLOYMENT_FILE" | sed 's/.*"frontend_url": *"\([^"]*\)".*/\1/' || echo "")
              BACKEND_URL=$(grep '"backend_url"' "$DEPLOYMENT_FILE" | sed 's/.*"backend_url": *"\([^"]*\)".*/\1/' || echo "")
            fi

            echo "📋 Deployment Info:"
            echo "  PR Number: $PR_NUMBER"
            echo "  Database ID: ${DB_ID:-"not found"}"
            echo "  KV ID: ${KV_ID:-"not found"}"
            echo "  Created At: ${CREATED_AT:-"not found"}"
            echo "  Frontend URL: ${FRONTEND_URL:-"not found"}"
            echo "  Backend URL: ${BACKEND_URL:-"not found"}"

            # Set outputs for cleanup steps
            echo "should_cleanup=true" >> $GITHUB_OUTPUT
            [ -n "$DB_ID" ] && echo "database_id=$DB_ID" >> $GITHUB_OUTPUT
            [ -n "$KV_ID" ] && echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
            [ -n "$FRONTEND_URL" ] && echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
            [ -n "$BACKEND_URL" ] && echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
            [ -n "$CREATED_AT" ] && echo "created_at=$CREATED_AT" >> $GITHUB_OUTPUT

            echo "✅ Cleanup will proceed for PR #$PR_NUMBER"
          else
            echo "⏭️ No deployment file found - skipping cleanup"
            echo "  This PR was never deployed or deployment info was lost"
            echo "should_cleanup=false" >> $GITHUB_OUTPUT
          fi

      - name: Delete Ephemeral Worker
        id: delete_worker
        if: steps.check_deployment.outputs.should_cleanup == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ steps.pr_number.outputs.pr_number }}
        run: |
          WORKER_NAME="rushomon-pr-$PR_NUMBER"

          echo "Attempting to delete worker: $WORKER_NAME"

          # Delete the worker
          DELETE_RESPONSE=$(curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$WORKER_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          SUCCESS=$(echo "$DELETE_RESPONSE" | jq -r '.success // false')

          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Successfully deleted worker: $WORKER_NAME"
            echo "worker_result=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Failed to delete worker: $WORKER_NAME"
            echo "Response: $DELETE_RESPONSE"
            echo "worker_result=failed" >> $GITHUB_OUTPUT
            # Continue anyway - We want to delete all resources
          fi

      - name: Delete KV Namespace
        id: delete_kv
        if: steps.check_deployment.outputs.should_cleanup == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ steps.pr_number.outputs.pr_number }}
          KV_ID: ${{ steps.check_deployment.outputs.kv_id }}
        run: |
          KV_NAME="URL_MAPPINGS_pr_$PR_NUMBER"

          echo "Attempting to delete KV namespace: $KV_NAME"

          # Use KV_ID from deployment file if available, otherwise fall back to lookup
          if [ -n "$KV_ID" ]; then
            echo "✅ Using KV ID from deployment file: $KV_ID"
          else
            echo "⚠️  KV ID not found in deployment file, falling back to lookup"

            # List namespaces to find the one matching our PR
            RESPONSE=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

            KV_ID=$(echo "$RESPONSE" | jq -r ".result[] | select(.title == \"$KV_NAME\") | .id" | head -1)
          fi

          if [ -z "$KV_ID" ]; then
            echo "⚠️  KV namespace not found: $KV_NAME (may have already been deleted)"
            echo "kv_result=not_found" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found KV namespace ID: $KV_ID"

          # Delete the KV namespace
          DELETE_RESPONSE=$(curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$KV_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          SUCCESS=$(echo "$DELETE_RESPONSE" | jq -r '.success // false')

          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Successfully deleted KV namespace: $KV_NAME"
            echo "kv_result=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Failed to delete KV namespace"
            echo "Response: $DELETE_RESPONSE"
            echo "kv_result=failed" >> $GITHUB_OUTPUT
            # Continue anyway - We want to delete all resources
          fi

      - name: Delete D1 Database
        id: delete_d1
        if: steps.check_deployment.outputs.should_cleanup == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ steps.pr_number.outputs.pr_number }}
          DB_ID: ${{ steps.check_deployment.outputs.database_id }}
        run: |
          DB_NAME="rushomon-pr-$PR_NUMBER"

          echo "Attempting to delete D1 database: $DB_NAME"

          # Use DB_ID from deployment file if available, otherwise fall back to lookup
          if [ -n "$DB_ID" ]; then
            echo "✅ Using DB ID from deployment file: $DB_ID"
          else
            echo "⚠️  DB ID not found in deployment file, falling back to lookup"

            # List databases to find the one matching our PR
            RESPONSE=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

            DB_ID=$(echo "$RESPONSE" | jq -r ".result[] | select(.name == \"$DB_NAME\") | .uuid // .id" | head -1)
          fi

          if [ -z "$DB_ID" ]; then
            echo "⚠️  Database not found: $DB_NAME (may have already been deleted)"
            echo "d1_result=not_found" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found database ID: $DB_ID"

          # Delete the database
          DELETE_RESPONSE=$(curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database/$DB_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          SUCCESS=$(echo "$DELETE_RESPONSE" | jq -r '.success // false')

          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Successfully deleted D1 database: $DB_NAME"
            echo "d1_result=success" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Failed to delete D1 database"
            echo "Response: $DELETE_RESPONSE"
            echo "d1_result=failed" >> $GITHUB_OUTPUT
            # Continue anyway - We want to delete all resources
          fi

      - name: Delete R2 Assets Bucket
        id: delete_r2
        if: steps.check_deployment.outputs.should_cleanup == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ steps.pr_number.outputs.pr_number }}
        run: |
          BUCKET_NAME="rushomon-assets-pr-$PR_NUMBER"
          echo "Attempting to delete R2 bucket: $BUCKET_NAME"

          # Try to delete the bucket directly first - this is more reliable
          DELETE_RESPONSE=$(curl -s -w "%{http_code}" -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$BUCKET_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          DELETE_HTTP_CODE="${DELETE_RESPONSE: -3}"
          DELETE_RESPONSE_BODY="${DELETE_RESPONSE%???}"

          if [ "$DELETE_HTTP_CODE" = "204" ] || [ "$DELETE_HTTP_CODE" = "200" ]; then
            echo "✅ Successfully deleted R2 bucket: $BUCKET_NAME"
            echo "r2_result=success" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If direct delete failed, check if bucket exists and has objects
          echo "Direct delete failed, checking bucket status..."

          # First check if bucket exists
          BUCKET_LIST_RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          BUCKET_EXISTS=$(echo "$BUCKET_LIST_RESPONSE" | jq -r ".result.buckets[]? | select(.name == \"$BUCKET_NAME\") | .name" | head -1 2>/dev/null)

          # If the above fails, try alternative structures
          if [ -z "$BUCKET_EXISTS" ]; then
            BUCKET_EXISTS=$(echo "$BUCKET_LIST_RESPONSE" | jq -r ".result[] | select(.name == \"$BUCKET_NAME\") | .name" | head -1 2>/dev/null)
          fi

          if [ -z "$BUCKET_EXISTS" ]; then
            echo "⚠️  R2 bucket not found: $BUCKET_NAME (may have already been deleted)"
            echo "r2_result=not_found" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Bucket exists, proceeding with object cleanup..."

          # List objects in bucket with better error handling
          LIST_RESPONSE=$(curl -s -w "%{http_code}" -X GET \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$BUCKET_NAME/objects?limit=1000" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          # Extract HTTP code (last 3 characters) and response body
          HTTP_CODE="${LIST_RESPONSE: -3}"
          RESPONSE_BODY="${LIST_RESPONSE%???}"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️  Failed to list bucket objects (HTTP $HTTP_CODE)"
            echo "Response: $RESPONSE_BODY"
            echo "r2_result=list_failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Check if bucket has objects with safer jq parsing
          echo "$RESPONSE_BODY" > /tmp/list_response.json
          OBJECT_COUNT=$(jq -r '.result | length' /tmp/list_response.json 2>/dev/null || echo "0")

          # Also check if the response indicates any objects at all
          HAS_OBJECTS=$(jq -r '.result | if length > 0 then "true" else "false" end' /tmp/list_response.json 2>/dev/null || echo "false")

          # Even if object count is 0, try to force delete all versions as there might be versioned objects
          if [ "$OBJECT_COUNT" -gt 0 ] || [ "$HAS_OBJECTS" = "true" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Found $OBJECT_COUNT objects, attempting to purge all versions..."

            # Try to delete all objects including versions
            PURGE_RESPONSE=$(curl -s -w "%{http_code}" -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$BUCKET_NAME/objects" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"objects":[{"key":"*"}]}')

            PURGE_HTTP_CODE="${PURGE_RESPONSE: -3}"
            PURGE_RESPONSE_BODY="${PURGE_RESPONSE%???}"

            # If wildcard purge doesn't work, try individual object deletion
            if [ "$PURGE_HTTP_CODE" != "200" ] && [ "$OBJECT_COUNT" -gt 0 ]; then
              echo "Wildcard purge failed, trying individual object deletion..."

              # Delete each object individually using the R2 API
              while IFS= read -r object_key; do
                if [ -n "$object_key" ]; then
                  DELETE_RESPONSE=$(curl -s -w "%{http_code}" -X DELETE \
                    "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$BUCKET_NAME/objects/$object_key" \
                    -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

                  DELETE_HTTP_CODE="${DELETE_RESPONSE: -3}"
                  DELETE_RESPONSE_BODY="${DELETE_RESPONSE%???}"

                  if [ "$DELETE_HTTP_CODE" != "200" ] && [ "$DELETE_HTTP_CODE" != "204" ]; then
                    echo "⚠️  Failed to delete object $object_key (HTTP $DELETE_HTTP_CODE)"
                    echo "Response: $DELETE_RESPONSE_BODY"
                    echo "r2_result=object_delete_failed" >> $GITHUB_OUTPUT
                    exit 1
                  fi
                fi
              done <<< "$(jq -r '.result[].key' /tmp/list_response.json)"

              echo "✅ Successfully deleted all objects individually"
            fi

            echo "✅ Successfully deleted all objects"
          else
            echo "Bucket appears empty, but will attempt deletion anyway..."
          fi

          # Now delete the bucket
          DELETE_RESPONSE=$(curl -s -w "%{http_code}" -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$BUCKET_NAME" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          DELETE_HTTP_CODE="${DELETE_RESPONSE: -3}"
          DELETE_RESPONSE_BODY="${DELETE_RESPONSE%???}"

          if [ "$DELETE_HTTP_CODE" = "204" ] || [ "$DELETE_HTTP_CODE" = "200" ]; then
            echo "✅ Successfully deleted R2 bucket: $BUCKET_NAME"
            echo "r2_result=success" >> $GITHUB_OUTPUT
          else
            # Parse error response
            SUCCESS=$(echo "$DELETE_RESPONSE_BODY" | jq -r '.success // false' 2>/dev/null || echo "false")
            ERROR_CODE=$(echo "$DELETE_RESPONSE_BODY" | jq -r '.errors[0].code // ""' 2>/dev/null || echo "")

            if [ "$ERROR_CODE" = "10006" ]; then
              echo "⚠️  R2 bucket not found: $BUCKET_NAME (may have already been deleted)"
              echo "r2_result=not_found" >> $GITHUB_OUTPUT
            else
              echo "⚠️  Failed to delete R2 bucket (HTTP $DELETE_HTTP_CODE)"
              echo "Response: $DELETE_RESPONSE_BODY"
              echo "r2_result=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

      - name: Cleanup Deployment Tracking File
        if: always() && steps.check_deployment.outputs.should_cleanup == 'true'
        run: |
          PR_NUMBER="${{ steps.pr_number.outputs.pr_number }}"
          DEPLOYMENT_FILE=".github/ephemeral-envs/pr-$PR_NUMBER.json"

          echo "Cleaning up deployment tracking file: $DEPLOYMENT_FILE"

          if [ -f "$DEPLOYMENT_FILE" ]; then
            rm "$DEPLOYMENT_FILE"
            echo "✅ Deployment tracking file deleted"
          else
            echo "⚠️  Deployment tracking file not found (may have been already deleted)"
          fi

      - name: Post Cleanup Notification
        if: always()
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          pr-number: ${{ steps.pr_number.outputs.pr_number }}
          message: |
            ${{ steps.check_deployment.outputs.should_cleanup == 'true' && '🧹 **Ephemeral Environment Cleaned Up**' || '⏭️ **Ephemeral Environment Cleanup Skipped**' }}

            ${{ steps.check_deployment.outputs.should_cleanup == 'true' && format('Resources for PR #{0} cleanup summary:', steps.pr_number.outputs.pr_number) || format('No deployment found for PR #{0} - nothing to clean up.', steps.pr_number.outputs.pr_number) }}

            ${{ steps.check_deployment.outputs.should_cleanup == 'true' && format('
            | Resource | Status |
            |----------|--------|
            | Worker `rushomon-pr-{0}` | {1}
            | KV Namespace `URL_MAPPINGS_pr_{0}` | {2}
            | D1 Database `rushomon-pr-{0}` | {3}
            | R2 Bucket `rushomon-assets-pr-{0}` | {4}

            *Cleanup completed automatically when PR was closed.*', steps.pr_number.outputs.pr_number, steps.delete_worker.outputs.worker_result == 'success' && '✅ Deleted' || steps.delete_worker.outputs.worker_result == 'failed' && '❌ Failed' || '⚠️ Not found', steps.delete_kv.outputs.kv_result == 'success' && '✅ Deleted' || steps.delete_kv.outputs.kv_result == 'failed' && '❌ Failed' || '⚠️ Not found', steps.delete_d1.outputs.d1_result == 'success' && '✅ Deleted' || steps.delete_d1.outputs.d1_result == 'failed' && '❌ Failed' || '⚠️ Not found', steps.delete_r2.outputs.r2_result == 'success' && '✅ Deleted' || steps.delete_r2.outputs.r2_result == 'failed' && '❌ Failed' || '⚠️ Not found') || '
            *No cleanup was needed as this PR was never deployed.*' }}

            ${{ steps.check_deployment.outputs.should_cleanup == 'true' && '**Note:** If this PR had the `skip-preview` label, resources were still cleaned up because they were deployed before the label was added.' || '**Note:** This helps avoid error messages and wasted API calls when PRs are never deployed.' }}
