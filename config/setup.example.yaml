# Usage:
# 1. Copy this file: cp config/setup.example.yaml config/setup.yaml
# 2. Edit config/setup.yaml with your values
# 3. Set environment variables for secrets:
#    export GITHUB_CLIENT_SECRET="your-github-secret"
#    export GOOGLE_CLIENT_SECRET="your-google-secret"     # If Google OAuth enabled
#    export JWT_SECRET="your-jwt-secret"
#    export MAILGUN_API_KEY="your-mailgun-key"            # If Mailgun enabled
#    export POLAR_ACCESS_TOKEN="your-polar-token"         # If Polar billing enabled
#    export POLAR_WEBHOOK_SECRET="your-polar-webhook"     # If Polar billing enabled
# 4. Run setup: ./scripts/setup.sh --config config/setup.yaml
